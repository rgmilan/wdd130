<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A quiz form about HTML and CSS basics">
    <meta name="author" content="Argy Milan">
    <title>HTML and CSS Basics Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <main class="quiz-container">
        <h1>HTML and CSS Basics Quiz</h1>
        <p class="intro">A simple quiz about the web design topics we study in class.</p>

        <form>
            <div class="form-item">
                <label for="q1">1. In web design, what does CSS stand for?</label>
                <input type="text" id="q1" name="q1" required>
            </div>

            <div class="form-item">
                <label for="q2">2. Why is it important to use headings, paragraphs, and other proper
                    HTML tags in a webpage?</label>
                <textarea id="q2" name="q2" rows="4" required></textarea>
            </div>

            <div class="form-item">
                <label for="q3">3. Which HTML tag is used to make a link to another page?</label>
                <select id="q3" name="q3" required>
                    <option value="" selected disabled>Choose one</option>
                    <option value="p">&lt;p&gt;</option>
                    <option value="a">&lt;a&gt;</option>
                    <option value="img">&lt;img&gt;</option>
                </select>
            </div>

            <div class="form-item">
                <label for="q4">4. How many heading levels are available in HTML?</label>
                <input type="number" id="q4" name="q4" required>
            </div>

            <button type="submit">Submit Quiz</button>
        </form>
    </main>
</body>

</html>
